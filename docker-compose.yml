# SM121 System — Full AI Agent Stack
# Services: LiteLLM (LLM Proxy) + CLI-Anything (CLI Manager) + Hermes-Agent (AI Agent Hub)

services:
  # ====================
  # LiteLLM — LLM Proxy Server (self-built for ARM64)
  # ====================
  litellm:
    image: litellm-sm121:latest
    container_name: litellm-sm121
    ports:
      - "4000:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - REDIS_HOST=hermes-redis
      - REDIS_PORT=6379
    volumes:
      - litellm-data:/app
      - /home/murray/litellm/config.yaml:/app/config.yaml:ro
    command: ["litellm", "--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ====================
  # CLI-Anything — CLI Package Manager
  # ====================
  cli-anything:
    image: cli-anything-sm121:latest
    container_name: cli-anything-sm121
    volumes:
      - cli-anything-data:/app
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ====================
  # Hermes-Agent — AI Agent Hub with Agency-Agents
  # ====================
  hermes-agent:
    build: .
    image: hermes-agent-hermes-agent:latest
    container_name: hermes-agent-sm121
    ports:
      - "3001:9119"  # Web dashboard
      - "8001:8642"  # API gateway (api_server platform, default port 8642)
    environment:
      - HERMES_HOME=/opt/data
      - HERMES_WEB_DIST=/opt/hermes/hermes_cli/web_dist
      - PYTHONUNBUFFERED=1
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # Upstream v2026.5.x now requires explicit opt-in to bind the dashboard
      # to a non-loopback host without an auth provider (OAuth gate). We sit
      # behind nginx + Cloudflare, so restore the pre-upgrade behaviour.
      - HERMES_DASHBOARD_INSECURE=1
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      # Persist Hermes data (sessions, logs, skills, configs)
      - hermes-data:/opt/data
      # Mount Agency-Agents into Hermes
      - /home/murray/agency-agents:/opt/data/agency-agents:ro
      # Mount Enterprise Skills into Hermes
      - /home/murray/enterprise-skills:/opt/data/skills/enterprise:ro
      # Mount converted Agency skills into Hermes
      - /home/murray/enterprise-skills/agency:/opt/data/skills/agency:ro
      # Docker socket for sandbox environments
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["gateway", "run", "--accept-hooks"]
    restart: unless-stopped

  # ====================
  # Redis — Cache for LiteLLM
  # ====================
  redis:
    image: redis:8.6.4
    container_name: hermes-redis
    command: redis-server --port 6379
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ====================
  # Nginx — Reverse Proxy (optional)
  # ====================
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - hermes-agent
      - litellm
    restart: unless-stopped

volumes:
  litellm-data:
  cli-anything-data:
  hermes-data:
  redis-data:
