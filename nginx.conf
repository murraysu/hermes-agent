events {
    worker_connections 1024;
}

http {
    client_max_body_size 50m;

    # --- Upstreams ---
    upstream hermes_agent {
        server hermes-agent-sm121:9119;
    }
    upstream hermes_api {
        server hermes-agent-sm121:8642;
    }
    upstream litellm {
        server litellm-sm121:4000;
    }
    upstream user_portal {
        server 172.22.0.1:8090;
    }
    upstream admin_panel {
        server 172.22.0.1:8888;
    }
    upstream channel_gw {
        server 172.22.0.1:5000;
    }
    upstream openwebui {
        server 172.22.0.1:3000;
    }
    upstream cli_hub {
        server 172.22.0.1:8080;
    }
    upstream qdrant {
        server 172.22.0.1:6333;
    }
    upstream paperclip {
        server 172.22.0.1:3100;
    }

    # ai.murray.tw — Cloudflare Flexible SSL sends HTTP; do NOT redirect
    server {
        listen 80;
        server_name ai.murray.tw;

        location /webhook/line {
            proxy_pass http://channel_gw/webhook/line;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / { return 404; }
    }

    # HTTP → HTTPS redirect
    server {
        listen 80 default_server;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name _;
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- Web UIs ---

        # Admin Panel (:8888)
        location /admin/ {
            proxy_pass http://admin_panel/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hermes Dashboard (:9119 inside container)
        location /hermes/ {
            proxy_pass http://hermes_agent/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenWebUI (:3000)
        location /openwebui/ {
            proxy_pass http://openwebui/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CLI-Hub Web (:8080) — static files served under /hub/
        location /cli-hub/ {
            proxy_pass http://cli_hub/hub/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- APIs ---

        # Hermes API (:8642 inside container)
        location /api/hermes/ {
            rewrite ^/api/hermes/(.*) /$1 break;
            proxy_pass http://hermes_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Channel Gateway (:5000)
        location /api/gw/ {
            rewrite ^/api/gw/(.*) /$1 break;
            proxy_pass http://channel_gw;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LiteLLM API (:4000)
        location /api/litellm/ {
            rewrite ^/api/litellm/(.*) /$1 break;
            proxy_pass http://litellm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Qdrant (:6333)
        location /qdrant/ {
            rewrite ^/qdrant/(.*) /$1 break;
            proxy_pass http://qdrant;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SSE streaming endpoint — must come before /api/
        location /api/chat/stream {
            proxy_pass http://user_portal;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding on;
            gzip off;
        }

        # User Portal API — long timeout for AI inference
        location /api/ {
            proxy_pass http://user_portal;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # --- User Web Portal (:8090) — 必須放最後 ---
        location / {
            proxy_pass http://user_portal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
